name: Deploy Blog
on:
  push:
    branches:
      - main
      - gh-pages
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install Jekyll (if using)
      run: sudo apt-get update && sudo apt-get install jekyll
    - name: Build and Deploy
      run: |
        if [ -f Gemfile ]; then
          bundle install
          bundle exec jekyll build --destination ./_site
        elif [ -f package.json ]; then
          npm install
          npm run build
        fi
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
